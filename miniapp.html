<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Tool</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; }
        button { width: 90%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; margin-top: 10px; }
        .card { background: #2c3e50; padding: 15px; border-radius: 12px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <h3>FREE FIRE MANAGER</h3>
    <input type="text" id="token" placeholder="Dán Token vào đây...">
    <button class="btn-start" onclick="handleStart()">BẮT ĐẦU CHẠY</button>

    <div id="resultCard" class="card">
        <p>Đang chạy: <span id="nickName"></span></p>
        <p>ID: <span id="sessId"></span></p>
        <button class="btn-stop" onclick="handleStop()">DỪNG LẠI</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // THAY IP VPS CỦA BẠN VÀO ĐÂY
        const SERVER_IP = "http://127.0.0.1:5005"; 
        let currentSess = "";

        async function handleStart() {
            const token = document.getElementById('token').value;
            const res = await fetch(`${SERVER_IP}/start?token=${token}&key=liggdzut123`, {
                headers: { 'X-TG-Data': tg.initData }
            });
            const data = await res.json();
            if(data.status === "success") {
                currentSess = data.session_id;
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('nickName').innerText = data.nickname;
                document.getElementById('sessId').innerText = data.session_id;
            } else { alert("Lỗi: " + data.message); }
        }

        async function handleStop() {
            const res = await fetch(`${SERVER_IP}/stop?session_id=${currentSess}`, {
                headers: { 'X-TG-Data': tg.initData }
            });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('resultCard').style.display = 'none';
                alert("Đã dừng!");
            }
        }
    </script>
</body>
</html>
