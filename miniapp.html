<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #1a1a1a;
            --tg-theme-button-color: #248bfe;
            --tg-theme-text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px; width: 85%;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            display: inline-block; margin-right: 8px;
            background: #ff4d4d; /* Mặc định đỏ */
        }
        .status-online { background: #00ff7f; box-shadow: 0 0 10px #00ff7f; }
        
        input {
            width: 100%; padding: 12px; margin: 15px 0;
            border-radius: 10px; border: none;
            background: rgba(255, 255, 255, 0.1); color: white;
            box-sizing: border-box; outline: none;
        }
        button {
            width: 100%; padding: 15px; border-radius: 12px;
            border: none; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-start { background-color: #248bfe; color: white; }
        .btn-stop { background-color: #ff4d4d; color: white; display: none; }
        .info { font-size: 0.9em; margin-top: 15px; color: #aaa; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-bottom: 5px;">FF MANAGER</h2>
        <div id="status-text"><span class="status-dot" id="dot"></span>Offline</div>
        
        <input type="text" id="token" placeholder="Nhập Token Access...">
        
        <button id="startBtn" class="btn-start" onclick="handleStart()">BẮT ĐẦU</button>
        <button id="stopBtn" class="btn-stop" onclick="handleStop()">DỪNG LẠI</button>

        <div id="accountInfo" class="info" style="display:none">
            <hr style="border: 0.5px solid #333">
            <p>👤 Nickname: <span id="nick">...</span></p>
            <p>🆔 UID: <span id="uid">...</span></p>
            <p>🌍 Region: <span id="reg">...</span></p>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:20115"; // Thay IP của bạn vào đây
        const KEY = "liggdzut123";
        let currentSession = null;

        async function handleStart() {
            const token = document.getElementById('token').value;
            if(!token) return alert("Vui lòng nhập token!");

            try {
                const res = await axios.get(`${API_BASE}/start?key=${KEY}&token=${token}`);
                if(res.data.status === "success") {
                    currentSession = res.data.session_id;
                    updateUI(true, res.data.account_detail);
                }
            } catch (e) { alert("Lỗi: " + e.response.data.message); }
        }

        async function handleStop() {
            try {
                await axios.get(`${API_BASE}/stop?key=${KEY}&session_id=${currentSession}`);
                updateUI(false);
            } catch (e) { alert("Không thể dừng!"); }
        }

        function updateUI(running, data = null) {
            document.getElementById('startBtn').style.display = running ? 'none' : 'block';
            document.getElementById('stopBtn').style.display = running ? 'block' : 'none';
            document.getElementById('dot').className = running ? 'status-dot status-online' : 'status-dot';
            document.getElementById('status-text').innerText = running ? ' Đang chạy' : ' Offline';
            
            if(data) {
                document.getElementById('accountInfo').style.display = 'block';
                document.getElementById('nick').innerText = data.nickname;
                document.getElementById('uid').innerText = data.uid;
                document.getElementById('reg').innerText = data.region;
            } else {
                document.getElementById('accountInfo').style.display = 'none';
            }
        }
    </script>
</body>
</html>
